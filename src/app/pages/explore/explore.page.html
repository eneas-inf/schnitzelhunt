<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      <div class="page-header">
        <ion-icon name="compass"></ion-icon>
        Explore
      </div>
    </ion-title>
  </ion-toolbar>
  <ion-toolbar>
    <ion-searchbar
      placeholder="Search for Schnitzelhunts"
      [value]="searchTerm"
      (ionInput)="onSearchInput($event)"
    ></ion-searchbar>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="filters">
    <ion-chip
      [color]="sortKey === 'category' ? 'primary' : 'medium'"
      (click)="setSortKey('category')"
    >Category
    </ion-chip>
    <ion-chip
      [color]="sortKey === 'difficulty' ? 'primary' : 'medium'"
      (click)="setSortKey('difficulty')"
    >Difficulty
    </ion-chip>
    <ion-chip
      [color]="sortKey === 'location' ? 'primary' : 'medium'"
      (click)="setSortKey('location')"
    >Location
    </ion-chip>
  </div>

  @if (visibleHunts.length === 0) {
    <p>No hunts found for this search.</p>
  } @else {
    <ion-list>
      @for (hunt of visibleHunts; track hunt.id) {
        <ion-card class="hunt-card">
          <ion-card-header>
            <ion-card-title>{{ hunt.name }}</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <p class="hunt-description">{{ hunt.description || "Explore the city's hidden gems." }}</p>
            <div class="hunt-card-footer">
              <span class="hunt-meta">Difficulty: {{ hunt.difficulty }}</span>
              <ion-button size="small" class="start-btn" (click)="startHunt(hunt)">Start</ion-button>
            </div>
          </ion-card-content>
        </ion-card>
      }
    </ion-list>
  }
</ion-content>
