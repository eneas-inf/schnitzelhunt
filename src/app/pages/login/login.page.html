<ion-content [fullscreen]="true" class="ion-no-padding">
  <div class="background-container">
    <div class="layer layer-1"></div>
    <div class="layer layer-2"></div>
    <div class="layer layer-3"></div>
    <div class="layer layer-4"></div>
  </div>

  <div class="content-container ion-padding">
    <div class="header-section">
      <div class="header-top">
        <ion-icon name="person-circle-outline" class="header-icon"></ion-icon>
        <h1 class="page-title">Login</h1>
      </div>
    </div>

    <div class="form-section">
      <div class="input-group">
        <ion-label class="input-label">Email / Username</ion-label>
        <ion-input type="text" placeholder="Enter your Email or Username" class="custom-input"></ion-input>
      </div>

      <div class="input-group">
        <ion-label class="input-label">Password</ion-label>
        <ion-input type="password" placeholder="Enter your Password" class="custom-input"></ion-input>
      </div>

      <div class="forgot-password-link">
        <a routerLink="/forgot-password">forgot password?</a>
      </div>
    </div>

    <div class="footer-section">
      <ion-button expand="block" class="action-btn" routerLink="/home">
        Login
        <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
      </ion-button>
      
      <div class="link-text">
        <a routerLink="/register">not registered yet? register now.</a>
      </div>
    </div>
  </div>
</ion-content>
