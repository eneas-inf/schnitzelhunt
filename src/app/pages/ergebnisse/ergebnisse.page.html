<ion-content [fullscreen]="true" class="ion-padding">
  <div class="results-container">
    <ion-text>
      <h1>Ergebnisse</h1>
    </ion-text>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Abgeschlossene Schnitzeljagd</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-list>
          <ion-item>
            <ion-label>
              <h2>Gesammelte Schnitzel:</h2>
              <p>5</p>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <h2>Gesammelte Kartoffeln:</h2>
              <p>12</p>
            </ion-label>
          </ion-item>

          <ion-item>
            <ion-label>
              <h2>Dauer:</h2>
              <p>00:45:30</p>
            </ion-label>
          </ion-item>
        </ion-list>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" color="primary" class="action-button">
      Zum Leaderboard
    </ion-button>
  </div>
</ion-content>
