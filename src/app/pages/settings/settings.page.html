<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Settings</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-list header="Account">
    <ion-list-header>
      <ion-label>Account</ion-label>
    </ion-list-header>
    <ion-item [button]="true" [detail]="true">
      <ion-label>Change Username</ion-label>
    </ion-item>
    <ion-item [button]="true" [detail]="true">
      <ion-label>Change Password</ion-label>
    </ion-item>
    <ion-item [button]="true" [detail]="true" routerLink="/startbildschirm">
      <ion-label color="danger">Logout</ion-label>
    </ion-item>
  </ion-list>

  <ion-list header="Preferences">
    <ion-list-header>
      <ion-label>Preferences</ion-label>
    </ion-list-header>
    <ion-item>
      <ion-label>Notifications</ion-label>
      <ion-toggle slot="end" [checked]="true"></ion-toggle>
    </ion-item>
    <ion-item [button]="true" [detail]="true">
      <ion-label>Appearance</ion-label>
    </ion-item>
    <ion-item>
      <ion-label>Dark-Mode</ion-label>
      <ion-toggle slot="end"></ion-toggle>
    </ion-item>
  </ion-list>
</ion-content>
