<ion-content [fullscreen]="true" class="ion-no-padding">
  <div class="background-container">
    <div class="layer layer-1"></div>
    <div class="layer layer-2"></div>
    <div class="layer layer-3"></div>
    <div class="layer layer-4"></div>
  </div>

  <div class="content-container ion-padding">
    <div class="header-section">
      <div class="header-top">
        <ion-icon name="person-add-outline" class="header-icon"></ion-icon>
        <h1 class="page-title">Register</h1>
      </div>
    </div>

    <div class="form-section">
      <div class="input-group">
        <ion-label class="input-label">Full Name</ion-label>
        <ion-input type="text" placeholder="Enter your full name" class="custom-input"></ion-input>
      </div>

      <div class="input-group">
        <ion-label class="input-label">Email</ion-label>
        <ion-input type="email" placeholder="Enter your email" class="custom-input"></ion-input>
      </div>

      <div class="input-group">
        <ion-label class="input-label">Username</ion-label>
        <ion-input type="text" placeholder="Choose a username" class="custom-input"></ion-input>
      </div>

      <div class="input-group">
        <ion-label class="input-label">Password</ion-label>
        <ion-input type="password" placeholder="Create a password" class="custom-input"></ion-input>
      </div>

      <div class="input-group">
        <ion-label class="input-label">Confirm Password</ion-label>
        <ion-input type="password" placeholder="Confirm your password" class="custom-input"></ion-input>
      </div>
    </div>

    <div class="footer-section">
      <ion-button expand="block" class="action-btn" routerLink="/berechtigungen">
        Create Account
        <ion-icon slot="end" name="chevron-forward-outline"></ion-icon>
      </ion-button>
      
      <div class="link-text">
        <a routerLink="/login">already have an account? sign in.</a>
      </div>
    </div>
  </div>
</ion-content>
