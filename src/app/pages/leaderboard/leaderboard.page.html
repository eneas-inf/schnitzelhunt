<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      <div style="display: flex; align-items: center;">
        <ion-icon name="trophy" style="margin-right: 8px; font-size: 1.2em;"></ion-icon>
        Leaderboard
      </div>
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  @if (entries.length === 0) {
    <p>No leaderboard entries yet.</p>
  } @else {
    <ion-list>
      @for (entry of entries; track entry.name; let i = $index) {
        <ion-item [class.current-user-item]="isCurrentUser(entry)">
          <ion-label>
            <h2>
              {{ i + 1 }}. {{ entry.name }}
              @if (isCurrentUser(entry)) {
                <ion-badge color="success" class="you-badge">You</ion-badge>
              }
            </h2>
            <p>{{ entry.hunts }} hunts played</p>
          </ion-label>
          <ion-badge [color]="getBadgeColor(i)" slot="end">{{ entry.points }} pts</ion-badge>
        </ion-item>
      }
    </ion-list>
  }
</ion-content>
