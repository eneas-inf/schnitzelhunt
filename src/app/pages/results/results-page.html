<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>ResultsPage</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding ion-text-center">
  <div class="result-header ion-padding-bottom">
    <h1>Schnitzelhunt overview:</h1>
  </div>

  <ion-card class="stats-card">
    <ion-card-content>
      <ion-list lines="none">
        <ion-item>
          <ion-icon name="restaurant" slot="start" color="warning"></ion-icon>
          <ion-label>
            <h3>Collected Schnitzel</h3>
            <h1>6</h1>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-icon name="egg" slot="start" color="medium"></ion-icon>
          <ion-label>
            <h3>Collected Potatoes</h3>
            <h1>2</h1>
          </ion-label>
        </ion-item>
        <ion-item>
          <ion-icon name="time" slot="start" color="primary"></ion-icon>
          <ion-label>
            <h3>Time</h3>
            <h1>00:25:30</h1>
          </ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <div class="ion-padding">
    <ion-button expand="block" routerLink="/leaderboard">Go to leaderboard</ion-button>
    <ion-button expand="block" fill="outline" color="medium" class="ion-margin-top" routerLink="/home">Back to Home</ion-button>
  </div>
</ion-content>
