<div class="scan-container">
  <div class="preview-frame" [class.error-flash]="previewErrorFlash">
    <video #previewVideo class="preview-video" muted></video>
    <img src="assets/overlays/qr-overlay.png" class="qr-overlay-image" alt="QR-Code overlay"/>
    <span class="corner top-left"></span>
    <span class="corner top-right"></span>
    <span class="corner bottom-left"></span>
    <span class="corner bottom-right"></span>
  </div>

  @if (cameraState !== 'active') {
    <p class="scan-status">{{ getStatusMessage() }}</p>
  }

  <button type="button" class="scan-button">
    SCAN ME
  </button>
</div>
