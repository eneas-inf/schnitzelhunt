<p class="distance-text">Distance: {{ getMetersLeft() }} Meters</p>
<div class="progress-bar-container">
  <ion-progress-bar [value]="getProgress()" color="primary"></ion-progress-bar>
  <p class="progress-text">Progress: {{ getProgress() * 100 }}% to destination</p>
</div>
<div class="map-placeholder">
  <!-- Placeholder for Map -->
  <img src="assets/shapes.svg" alt="Map View"
       style="opacity: 0.1; width: 100%; height: 100%; object-fit: cover;">
  <ion-icon name="navigate-circle-outline" class="map-icon"></ion-icon>
</div>
