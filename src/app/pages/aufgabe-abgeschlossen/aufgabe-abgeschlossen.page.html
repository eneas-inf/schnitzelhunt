<ion-content [fullscreen]="true" class="ion-padding">
  <div class="completed-container">
    <div class="success-icon">
      <ion-icon name="checkmark-circle" color="success"></ion-icon>
    </div>

    <ion-text>
      <h1>Aufgabe erfolgreich abgeschlossen!</h1>
    </ion-text>

    <ion-card>
      <ion-card-content>
        <ion-text>
          <p>Du hast diese Aufgabe gemeistert und Punkte gesammelt.</p>
        </ion-text>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" color="primary" class="action-button">
      Nächste Aufgabe
    </ion-button>

    <ion-button expand="block" fill="outline" color="medium" class="action-button">
      Schnitzeljagd beendet
    </ion-button>
  </div>
</ion-content>
