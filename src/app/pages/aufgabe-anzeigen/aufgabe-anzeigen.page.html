<ion-content [fullscreen]="true" class="ion-padding">
  <div class="task-container">
    <ion-text>
      <h1>Aufgabe anzeigen</h1>
    </ion-text>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Aktuelle Aufgabe</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-text>
          <p>Zeigt den Titel und Einführungstext der aktuellen Schnitzeljagd-Aufgabe an.</p>
        </ion-text>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" color="primary" class="action-button">
      Aufgabe erledigt
    </ion-button>

    <ion-button expand="block" fill="outline" color="medium" class="action-button">
      Aufgabe überspringen
    </ion-button>

    <ion-button expand="block" fill="clear" color="danger" class="action-button">
      Schnitzeljagd abbrechen
    </ion-button>
  </div>
</ion-content>
