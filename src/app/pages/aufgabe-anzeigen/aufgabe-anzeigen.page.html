<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/explore"></ion-back-button>
    </ion-buttons>
    <ion-title>City Explorer Hunt</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="task-header ion-padding-bottom">
    <h2>Task 1/7:</h2>
    <h1>Go to Migros</h1>
  </div>

  <div class="task-details ion-margin-vertical">
    <ion-item lines="none">
      <ion-icon name="navigate-circle-outline" slot="start" size="large"></ion-icon>
      <ion-label>
        <h2>Distance</h2>
        <p>172 meters</p>
      </ion-label>
    </ion-item>
  </div>

  <div class="progress-section ion-margin-vertical">
    <div class="progress-label">
      <span>Progress: 75% to destination</span>
    </div>
    <ion-progress-bar value="0.75" color="primary"></ion-progress-bar>
  </div>

  <div class="map-placeholder ion-margin-vertical" style="height: 200px; background-color: #f0f0f0; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
    <ion-text color="medium">Map View</ion-text>
  </div>

  <div class="actions ion-padding-top">
    <ion-button expand="block" size="large" routerLink="/aufgabe-abgeschlossen">Next Task</ion-button>
    <ion-button expand="block" fill="clear" color="danger" routerLink="/ergebnisse">Surrender</ion-button>
  </div>
</ion-content>
