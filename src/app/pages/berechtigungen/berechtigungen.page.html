<ion-content [fullscreen]="true" class="ion-padding">
  <div class="permissions-container">
    <ion-text>
      <h1>Berechtigungen</h1>
    </ion-text>

    <ion-card>
      <ion-card-header>
        <ion-card-title>Benötigte Berechtigungen</ion-card-title>
      </ion-card-header>
      <ion-card-content>
        <ion-text>
          <p>Um die App voll zu starten, benötigt die App Zugriff auf:</p>
        </ion-text>

        <ion-list>
          <ion-item>
            <ion-icon name="camera" slot="start"></ion-icon>
            <ion-label>Kamera (für QR-Codes)</ion-label>
          </ion-item>

          <ion-item>
            <ion-icon name="location" slot="start"></ion-icon>
            <ion-label>Standort (für Geolocation-Aufgaben)</ion-label>
          </ion-item>
        </ion-list>

        <ion-text>
          <p class="info-text">
            Bitte erlaube die notwendigen Berechtigungen, wenn Sie dazu aufgefordert werden.
          </p>
        </ion-text>
      </ion-card-content>
    </ion-card>

    <ion-button expand="block" color="primary" class="continue-button" routerLink="/aufgabe-anzeigen">
      Berechtigungen erteilen
    </ion-button>
  </div>
</ion-content>
